asyncapi: 3.0.0
id: urn:com.arcadiaeditions:api-contract-commons:asyncapi:master
info:
  title: "Arcadia Editions - Master AsyncAPI Components"
  version: 0.0.1
  description: >
    Shared AsyncAPI sections for Arcadia Editions event-driven APIs. Service
    contracts should reference these sections for common Kafka servers, protocol
    bindings, security schemes, correlation IDs, and message headers.

defaultContentType: application/json

servers:
  local:
    host: localhost:9092
    protocol: kafka
    protocolVersion: "3.x"
    description: Local Kafka broker for development and contract testing.
    bindings:
      $ref: "#/components/serverBindings/confluentSchemaRegistry"
  develop:
    host: "{bootstrapServers}"
    protocol: kafka-secure
    protocolVersion: "3.x"
    description: Shared development Kafka cluster.
    security:
      - $ref: "#/components/securitySchemes/kafkaSaslPlain"
    variables:
      bootstrapServers:
        description: Kafka bootstrap server list for the develop environment.
        default: develop.kafka.arcadia-editions.example:9092
    bindings:
      $ref: "#/components/serverBindings/confluentSchemaRegistry"
  pre:
    host: "{bootstrapServers}"
    protocol: kafka-secure
    protocolVersion: "3.x"
    description: Pre-production Kafka cluster.
    security:
      - $ref: "#/components/securitySchemes/kafkaSaslPlain"
    variables:
      bootstrapServers:
        description: Kafka bootstrap server list for the pre environment.
        default: pre.kafka.arcadia-editions.example:9092
    bindings:
      $ref: "#/components/serverBindings/confluentSchemaRegistry"
  prod:
    host: "{bootstrapServers}"
    protocol: kafka-secure
    protocolVersion: "3.x"
    description: Production Kafka cluster.
    security:
      - $ref: "#/components/securitySchemes/kafkaSaslPlain"
    variables:
      bootstrapServers:
        description: Kafka bootstrap server list for the prod environment.
        default: prod.kafka.arcadia-editions.example:9092
    bindings:
      $ref: "#/components/serverBindings/confluentSchemaRegistry"

components:
  securitySchemes:
    kafkaSaslPlain:
      type: plain
      description: Kafka API key and secret used with SASL/PLAIN over TLS.
    schemaRegistryBasicAuth:
      type: http
      scheme: basic
      description: Schema Registry API key and secret used with HTTP basic auth.

  serverBindings:
    confluentSchemaRegistry:
      kafka:
        schemaRegistryUrl: "{schemaRegistryUrl}"
        schemaRegistryVendor: confluent
        bindingVersion: "0.5.0"

  channelBindings:
    kafkaTopicXSRetained:
      kafka:
        partitions: 1
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["delete"]
          retention.ms: 604800000
          retention.bytes: 1000000000
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2
    kafkaTopicSRetained:
      kafka:
        partitions: 3
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["delete"]
          retention.ms: 604800000
          retention.bytes: 1000000000
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2
    kafkaTopicMRetained:
      kafka:
        partitions: 9
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["delete"]
          retention.ms: 604800000
          retention.bytes: 1000000000
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2
    kafkaTopicXSCompacted:
      kafka:
        partitions: 1
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["compact"]
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2
    kafkaTopicSCompacted:
      kafka:
        partitions: 3
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["compact"]
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2
    kafkaTopicMCompacted:
      kafka:
        partitions: 9
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["compact"]
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-env-server-overrides:
          dev:
            partitions: 1
            replicas: 1
            topicConfiguration:
              cleanup.policy: ["delete"]
              retention.ms: 604800
          staging:
            partitions: 3
            replicas: 2

  messageTraits:
    kafkaTopicNameStrategy:
      bindings:
        kafka:
          schemaLookupStrategy: "TopicNameStrategy" # `<topic_name>-value` y `<topic_name>-key`
          x-normalize: true
    kafkaTopicRecordNameStrategy:
      bindings:
        kafka:
          schemaLookupStrategy: "TopicRecordNameStrategy" # `<topic_name>-<record_name>-value` y `<topic_name>-<record_name>-key`
          x-normalize: true
    kafkaBackwardCompatibility:
      bindings:
        kafka:
          x-schemaCompatibility: "BACKWARD"
    kafkaKeyString:
      bindings:
        kafka:
          key:
            type: string
    kafkaKeyLong:
      bindings:
        kafka:
          key:
            type: integer
            format: int64

    CommonHeaders:
      headers:
        type: object
        properties: {}
    CloudEventsHeaders:
      headers:
        type: object
        required:
          - ce-id
          - ce-source
          - ce-specversion
          - ce-type
          - ce-time
        properties:
          ce-id:
            type: string
            description: Unique identifier for the event.
            x-runtime-expression: "$message.payload#{#this.id}"
          ce-source:
            type: string
            description: URI identifying the context where the event happened.
            x-runtime-expression: "$message.payload#{#this.getClass().getPackageName()}"
          ce-specversion:
            type: string
            description: CloudEvents specification version.
            x-runtime-expression: "$message.payload#{'1.0'}"
          ce-type:
            type: string
            description: Event type.
            x-runtime-expression: "$message.payload#{#this.getClass().getSimpleName()}"
          ce-time:
            type: string
            format: date-time
            description: Timestamp of when the event happened.
            x-runtime-expression: "$message.payload#{T(java.time.Instant).now().toString()}"
          ce-subject:
            type: string
            description: Subject of the event in the source context.
            x-runtime-expression: "$message.payload#/id"
          ce-datacontenttype:
            type: string
            description: Content type for the event payload.
            default: application/json
            x-runtime-expression: "$message.payload#{'application/json'}"
          ce-dataschema:
            type: string
            format: uri
            description: URI of the schema that describes the event payload.
    KafkaRuntimeHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: integer
            format: int64
            description: This header value is populated automatically at runtime.
            x-runtime-expression: "$message.payload#/id"
