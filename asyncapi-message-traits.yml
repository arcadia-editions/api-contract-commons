asyncapi: 3.1.0
id: urn:com.arcadiaeditions:api-contract-commons:asyncapi:message-traits
info:
  title: "Arcadia Editions - AsyncAPI Message Traits"
  version: 0.0.1
  description: >
    Shared AsyncAPI Message Traits.

components:
  messageTraits:
    kafkaTopicNameStrategy:
      bindings:
        kafka:
          schemaLookupStrategy: "TopicNameStrategy" # `<topic_name>-value` y `<topic_name>-key`
          x-normalize: true
    kafkaTopicRecordNameStrategy:
      bindings:
        kafka:
          schemaLookupStrategy: "TopicRecordNameStrategy" # `<topic_name>-<record_name>-value` y `<topic_name>-<record_name>-key`
          x-normalize: true
    kafkaBackwardCompatibility:
      bindings:
        kafka:
          x-schemaCompatibility: "BACKWARD"
    kafkaKeyString:
      bindings:
        kafka:
          key:
            type: string
    kafkaKeyLong:
      bindings:
        kafka:
          key:
            type: integer
            format: int64

    CommonHeaders:
      headers:
        type: object
        properties: { }
    CloudEventsHeaders:
      headers:
        type: object
        required:
          - ce-id
          - ce-source
          - ce-specversion
          - ce-type
          - ce-time
        properties:
          ce-id:
            type: string
            description: Unique identifier for the event.
            x-runtime-expression: "$message.payload#{#this.id}"
          ce-source:
            type: string
            description: URI identifying the context where the event happened.
            x-runtime-expression: "$message.payload#{#this.getClass().getPackageName()}"
          ce-specversion:
            type: string
            description: CloudEvents specification version.
            x-runtime-expression: "$message.payload#{'1.0'}"
          ce-type:
            type: string
            description: Event type.
            x-runtime-expression: "$message.payload#{#this.getClass().getSimpleName()}"
          ce-time:
            type: string
            format: date-time
            description: Timestamp of when the event happened.
            x-runtime-expression: "$message.payload#{T(java.time.Instant).now().toString()}"
          ce-subject:
            type: string
            description: Subject of the event in the source context.
            x-runtime-expression: "$message.payload#/id"
          ce-datacontenttype:
            type: string
            description: Content type for the event payload.
            default: application/json
            x-runtime-expression: "$message.payload#{'application/json'}"
          ce-dataschema:
            type: string
            format: uri
            description: URI of the schema that describes the event payload.
    KafkaRuntimeHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: integer
            format: int64
            description: This header value is populated automatically at runtime.
            x-runtime-expression: "$message.payload#/id"
