asyncapi: 3.2.0
id: urn:com.arcadiaeditions:api-contract-commons:asyncapi:error-topics
info:
  title: "Arcadia Editions - AsyncAPI Error Topics"
  version: 0.0.1
  description: >
    Shared AsyncAPI Error Topics

components:
  error-topics:
    retry:
      silver:
        partitions: 1
        replicas: 2
        topicConfiguration:
          retention.ms: 259200000       # 3 days
      gold:
        partitions: 3
        replicas: 3
        topicConfiguration:
          retention.ms: 604800000       # 7 days
    dlq:
      standard:
        partitions: 1
        replicas: 2
        topicConfiguration:
          retention.ms: 2592000000      # 30 days
          cleanup.policy: ["delete"]
      compliance:
        partitions: 1
        replicas: 3
        topicConfiguration:
          retention.ms: 31536000000     # 1 year
          cleanup.policy: ["delete"]
